<div class="background-lights" aria-hidden="true">
  <div class="light x1"></div>
  <div class="light x2"></div>
  <div class="light x3"></div>
  <div class="light x4"></div>
  <div class="light x5"></div>
  <div class="light x6"></div>
  <div class="light x7"></div>
  <div class="light x8"></div>
  <div class="light x9"></div>
</div>

<header class="site-header">
  <button type="button" class="logo logo-button" (click)="setActivePage('about')">CryptCode</button>

  <div class="header-actions">
    <nav class="nav-menu">
      <button
        type="button"
        class="nav-button nav-about"
        [class.active]="activePage === 'about'"
        (click)="setActivePage('about')"
      >
        About
      </button>

      <button
        type="button"
        class="nav-button nav-demo"
        [class.active]="activePage === 'demo'"
        (click)="setActivePage('demo')"
      >
        Demo
      </button>

      <button
        type="button"
        class="nav-button nav-test-drive"
        [class.active]="activePage === 'try'"
        (click)="setActivePage('try')"
      >
        Test Drive
      </button>
    </nav>

    <a
      class="github-link"
      href="https://github.com/rlopez4042/cs420-module-0"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="View CryptCode language repository on GitHub"
      title="View language repo"
    >
      <span class="github-icon" aria-hidden="true"></span>
    </a>
  </div>
</header>

<main class="page">
  @if (activePage === 'about') {
    <section class="section" [class]="slideDirection">
      <app-about></app-about>
    </section>
  }

  @if (activePage === 'demo') {
    <section class="section" [class]="slideDirection">
      <app-demo />
    </section>
  }

  @if (activePage === 'try') {
    <section class="section" [class]="slideDirection">
      <app-test-drive></app-test-drive>
    </section>
  }
</main>

<footer class="site-footer">
  <p>
    <a href="https://github.com/rlopez4042/cryptcode-web" target="_blank" rel="noopener noreferrer">
      View website repository
    </a>
  </p>
</footer>
